# VPS Production docker-compose
# Run: docker compose -f docker-compose.prod.yml up -d
#
# For LOCAL dev, use the existing docker-compose.yml (Postgres only).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    expose:
      - "4000"
    depends_on:
      - nginx
    networks:
      - mathhub

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/letsencrypt:ro
      - ./certs/www:/var/www/certbot:ro
    networks:
      - mathhub

networks:
  mathhub:
    driver: bridge
