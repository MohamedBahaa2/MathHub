services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mathhub
      POSTGRES_USER: mathhub
      POSTGRES_PASSWORD: mathhub
    ports:
      - "5433:5432"
    volumes:
      - mathhub_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathhub -d mathhub"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mathhub_postgres:
